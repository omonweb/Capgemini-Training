server:
  port: 6000

spring:
  application:
    name: Capgi_BankAccount

  datasource:
    url: jdbc:mysql://localhost:3306/bankAccounts_microservice
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update   # Options: none, validate, update, create, create-drop
    show-sql: true
    database-platform: org.hibernate.dialect.MySQL8Dialect